<h2>All Groups</h2>

{% for group in groups %}
    <div style="border:1px solid gray; padding:10px; margin:10px;">
        <h3>{{ group['group_name'] }}</h3>
        <p>{{ group['description'] }}</p>
        <p><strong>Owner:</strong> {{ group['username'] }}</p>
    </div>
{% else %}
    <p>No groups available.</p>
{% endfor %}

{% extends "base.html" %}
{% block content %}

<style>
/* Page Styling */
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 0;
    color: #fff;
}

/* Welcome Heading */
h2 {
    text-align: center;
    margin-top: 20px;
    font-size: 28px;
}

/* Grid Layout */
.dashboard-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 40px;
}

/* Card Design */
.card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 25px;
    text-align: center;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* Button Styling */
.card a {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 18px;
    text-decoration: none;
    background: #ffffff;
    color: #333;
    border-radius: 25px;
    font-weight: bold;
    transition: 0.3s ease;
}

/* Hover Effects */
.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 25px rgba(0,0,0,0.3);
}

.card a:hover {
    background: #ffdd57;
    color: #000;
}

/* Responsive spacing */
@media (max-width: 600px) {
    .dashboard-container {
        padding: 20px;
    }
}
</style>

<h2>Welcome, {{ session.get('username') }} 👋</h2>

<div class="dashboard-container">

    <div class="card">
        <h3>Create Group</h3>
        <a href="/create_group">Open</a>
    </div>

    <div class="card">
        <h3>View All Groups</h3>
        <a href="/all_groups">Browse</a>
    </div>

    <div class="card">
        <h3>Invitations</h3>
        <a href="/invitations">Check</a>
    </div>

    <div class="card">
        <h3>My Groups</h3>
        <a href="/my_groups">View</a>
    </div>

    <div class="card">
        <h3>Connections ({{ connection_count }})</h3>
        <a href="{{ url_for('connections') }}">Open</a>
    </div>

    <div class="card">
        <h3>Add New Project</h3>
        <a href="{{ url_for('add_project') }}">Add</a>
    </div>

    <div class="card">
        <h3>My Projects</h3>
        <a href="{{ url_for('my_projects') }}">View</a>
    </div>

    <div class="card">
        <h3>Explore Projects</h3>
        <a href="{{ url_for('view_projects') }}">Browse</a>
    </div>

</div>

{% endblock %}
